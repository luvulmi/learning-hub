spring.application.name=learning-hub-backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/learning_hub}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# JWT
jwt.secret=${JWT_SECRET:local-dev-secret-must-be-at-least-32-characters-long}
jwt.expiration-ms=86400000

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# Frontend URL (OAuth2 콜백 리다이렉트 대상)
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
